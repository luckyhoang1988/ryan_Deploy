# Production compose — KHÁC dev ở các điểm an toàn:
#  - DJANGO_SETTINGS_MODULE=ryandeploy.settings.prod (DEBUG off, cookie secure, CORS đóng).
#  - KHÔNG mount source ./backend vào container (chỉ chạy code trong image đã build).
#  - KHÔNG publish Postgres/Redis ra host (chỉ truy cập nội bộ qua network compose).
#  - worker/beat có healthcheck và chờ Postgres/Redis healthy.
# Yêu cầu file .env cung cấp: DJANGO_SECRET_KEY, RYANDEPLOY_VAULT_KEY, POSTGRES_PASSWORD.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ryandeploy}
      POSTGRES_USER: ${POSTGRES_USER:-ryandeploy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD phải được đặt ở production}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Không publish port ra host ở production.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ryandeploy}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    # Không publish port ra host ở production.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             gunicorn ryandeploy.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    environment:
      DJANGO_SETTINGS_MODULE: ryandeploy.settings.prod
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - media:/app/media
    ports:
      # Chỉ mở cho nginx trên host (reverse proxy + TLS); không lộ HTTP thuần ra LAN.
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A ryandeploy worker --loglevel=info --concurrency=${RYANDEPLOY_MAX_CONCURRENCY:-15}
    environment:
      DJANGO_SETTINGS_MODULE: ryandeploy.settings.prod
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - media:/app/media
    healthcheck:
      test: ["CMD-SHELL", "celery -A ryandeploy inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: ./backend
    command: >
      celery -A ryandeploy beat --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
      --pidfile=/tmp/celerybeat.pid
    environment:
      DJANGO_SETTINGS_MODULE: ryandeploy.settings.prod
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    healthcheck:
      # beat không có ping như worker → kiểm tra process còn sống qua pidfile.
      test: ["CMD-SHELL", "kill -0 $(cat /tmp/celerybeat.pid)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  media:
