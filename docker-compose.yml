services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ryandeploy}
      POSTGRES_USER: ${POSTGRES_USER:-ryandeploy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ryandeploy}
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Chỉ bind 127.0.0.1 — web/worker/beat nối qua network nội bộ compose (host "postgres"),
      # không cần expose ra LAN; vẫn cho phép tool trên máy dev (DBeaver, psql...) nối localhost.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ryandeploy}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    environment:
      TZ: Asia/Ho_Chi_Minh
    ports:
      # Chỉ bind 127.0.0.1 — cùng lý do với postgres ở trên; Redis dev vẫn không có auth
      # nhưng không còn nghe trên toàn LAN.
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             uvicorn ryandeploy.asgi:application --host 0.0.0.0 --port 8000 --workers 3"
    environment:
      DJANGO_SETTINGS_MODULE: ryandeploy.settings.dev
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      TZ: Asia/Ho_Chi_Minh
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A ryandeploy worker --loglevel=info --concurrency=${RYANDEPLOY_MAX_CONCURRENCY:-15}
    environment:
      DJANGO_SETTINGS_MODULE: ryandeploy.settings.dev
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      TZ: Asia/Ho_Chi_Minh
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - media:/app/media
    depends_on:
      - web
      - redis
      - postgres

  beat:
    build: ./backend
    command: celery -A ryandeploy beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DJANGO_SETTINGS_MODULE: ryandeploy.settings.dev
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      TZ: Asia/Ho_Chi_Minh
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - web
      - redis
      - postgres

volumes:
  pgdata:
  media:
